# external/sources.yml — registry of third-party skill repositories.
#
# `awesome-skills` does NOT vendor these. Instead, `scripts/sync_external.py`
# shallow-clones each entry into `external/<slug>/` on demand, then
# `scripts/sync_external.py --update` fast-forwards them. `external/<slug>/`
# is gitignored; only this registry + external/README.md are tracked.
#
# Schema:
#   slug:          directory name under external/
#   url:           git clone URL
#   branch:        default branch (omit to use HEAD)
#   license:       upstream license (SPDX identifier)
#   category:      official | curated-list | subagent-collection | plugin-marketplace
#   description:   one-liner shown in external/README.md table
#   tags:          free-form tags for filtering
#   home:          human-readable project homepage (optional)

version: 1
sources:

