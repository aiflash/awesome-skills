# Comprehensive Skill Evaluation
# Runs the skill_analyzer tooling daily against the whole skills/ tree,
# generates website data (skills-data.js) and self-scored reports, and on
# the main branch syncs the skill count badge/stat into README.md and
# index.html.

name: Comprehensive Skill Evaluation

on:
  schedule:
    - cron: '0 4 * * *'  # Daily at 04:00 UTC
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'skills/**'
      - 'tools/**'
      - 'scripts/generate_skills_data.py'
      - 'scripts/update_project_files.py'
      - '.github/workflows/comprehensive-evaluation.yml'

env:
  PYTHON_VERSION: "3.12"

jobs:
  # ---------------------------------------------------------------------------
  # 1. Evaluate skills + generate data for the website
  # ---------------------------------------------------------------------------
  evaluate:
    name: Evaluate & generate data
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install pyyaml rich
          pip install -e ./tools/

      - name: Generate website skills data
        run: python3 scripts/generate_skills_data.py

      - name: Score skills (8-dimension rubric)
        run: |
          mkdir -p reports
          python -m tools.skill_analyzer.cli score \
            --output json > reports/skill_scores.json
        continue-on-error: true

      - name: Token budget report
        run: |
          python -m tools.skill_analyzer.cli tokenizer \
            --output json > reports/skill_tokens.json
        continue-on-error: true

      - name: Anti-pattern scan
        run: |
          python -m tools.skill_analyzer.cli antipattern \
            --output json > reports/skill_antipatterns.json
        continue-on-error: true

      - name: Upload evaluation artifacts
        uses: actions/upload-artifact@v4
        with:
          name: evaluation-report
          path: |
            reports/skill_scores.json
            reports/skill_tokens.json
            reports/skill_antipatterns.json
            assets/js/skills-data.js
          retention-days: 30

  # ---------------------------------------------------------------------------
  # 2. Sync skill count into README.md + index.html (main branch only)
  # ---------------------------------------------------------------------------
  sync-counts:
    name: Sync skill counts into README & index.html
    runs-on: ubuntu-latest
    needs: evaluate
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Download evaluation artifacts
        uses: actions/download-artifact@v4
        with:
          name: evaluation-report
          path: .

      - name: Sync counts
        run: python3 scripts/update_project_files.py

      - name: Commit & push if changed
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add README.md index.html assets/js/ reports/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: sync skill counts and evaluation data [ci skip]"
            git push
          fi
